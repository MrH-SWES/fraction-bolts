<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ======== AUDIO SYNTHESIS ======== */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio(){ if(!audioCtx) audioCtx = new AudioCtx(); }

function playSuccess(){
  ensureAudio();
  const d=.35, ctx=audioCtx, now=ctx.currentTime;
  // impact wrench burst
  for(let i=0;i<6;i++){
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type='square'; o.frequency.value=80+Math.random()*120;
    g.gain.setValueAtTime(.18,now+i*.04);
    g.gain.exponentialRampToValueAtTime(.001,now+i*.04+.06);
    o.connect(g); g.connect(ctx.destination);
    o.start(now+i*.04); o.stop(now+i*.04+.08);
  }
  // low thud
  const o2=ctx.createOscillator(),g2=ctx.createGain();
  o2.type='sine'; o2.frequency.value=55;
  g2.gain.setValueAtTime(.3,now+.25); g2.gain.exponentialRampToValueAtTime(.001,now+.6);
  o2.connect(g2); g2.connect(ctx.destination);
  o2.start(now+.25); o2.stop(now+.7);
}

function playSmallFail(){
  ensureAudio();
  const ctx=audioCtx, now=ctx.currentTime;
  // metallic tink
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type='triangle'; o.frequency.value=2200;
  o.frequency.exponentialRampToValueAtTime(800,now+.15);
  g.gain.setValueAtTime(.2,now); g.gain.exponentialRampToValueAtTime(.001,now+.2);
  o.connect(g); g.connect(ctx.destination);
  o.start(now); o.stop(now+.25);
}

function playLargeFail(){
  ensureAudio();
  const ctx=audioCtx, now=ctx.currentTime;
  // grinding
  const buf=ctx.createBuffer(1,ctx.sampleRate*.6,ctx.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*.3*Math.max(0,1-i/data.length);
  const src=ctx.createBufferSource(); src.buffer=buf;
  const flt=ctx.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=600; flt.Q.value=2;
  src.connect(flt); flt.connect(ctx.destination);
  src.start(now); src.stop(now+.6);
  // power-down hum
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(200,now+.5);
  o.frequency.exponentialRampToValueAtTime(30,now+1.5);
  g.gain.setValueAtTime(.15,now+.5); g.gain.exponentialRampToValueAtTime(.001,now+1.5);
  o.connect(g); g.connect(ctx.destination);
  o.start(now+.5); o.stop(now+1.6);
}

/* ======== TEXTURE GENERATORS ======== */
function createSteelTexture(w,h){
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  const ctx=c.getContext('2d');
  // base
  ctx.fillStyle='#556';
  ctx.fillRect(0,0,w,h);
  // scratches
  for(let i=0;i<120;i++){
    ctx.strokeStyle=`rgba(${150+Math.random()*60},${150+Math.random()*60},${160+Math.random()*60},${.1+Math.random()*.15})`;
    ctx.lineWidth=.5+Math.random()*1.5;
    ctx.beginPath();
    const x=Math.random()*w, y=Math.random()*h;
    ctx.moveTo(x,y);
    ctx.lineTo(x+Math.random()*80-40, y+Math.random()*80-40);
    ctx.stroke();
  }
  // grain noise
  const img=ctx.getImageData(0,0,w,h);
  for(let i=0;i<img.data.length;i+=4){
    const n=(Math.random()-.5)*20;
    img.data[i]+=n; img.data[i+1]+=n; img.data[i+2]+=n;
  }
  ctx.putImageData(img,0,0);
  return new THREE.CanvasTexture(c);
}

function createBoltTexture(label, stripped){
  const s=128, c=document.createElement('canvas'); c.width=s; c.height=s;
  const ctx=c.getContext('2d');
  if(stripped){
    ctx.fillStyle='#654';
    ctx.fillRect(0,0,s,s);
    for(let i=0;i<40;i++){
      ctx.strokeStyle=`rgba(200,120,60,${.15+Math.random()*.2})`;
      ctx.lineWidth=1+Math.random()*3;
      ctx.beginPath();
      ctx.arc(s/2,s/2,10+Math.random()*40,Math.random()*Math.PI*2,Math.random()*Math.PI*2);
      ctx.stroke();
    }
  } else {
    ctx.fillStyle='#889';
    ctx.fillRect(0,0,s,s);
    // hex pattern subtle
    for(let i=0;i<20;i++){
      ctx.strokeStyle=`rgba(120,120,140,${.08+Math.random()*.1})`;
      ctx.lineWidth=.5;
      ctx.beginPath();
      ctx.moveTo(Math.random()*s,Math.random()*s);
      ctx.lineTo(Math.random()*s,Math.random()*s);
      ctx.stroke();
    }
  }
  // label
  ctx.fillStyle=stripped?'#a66':'#dde';
  ctx.font='bold 22px Courier New';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(label, s/2, s/2);
  return new THREE.CanvasTexture(c);
}

function createCooldownTexture(progress, label){
  const s=128, c=document.createElement('canvas'); c.width=s; c.height=s;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#222';
  ctx.fillRect(0,0,s,s);
  // circular progress
  const cx=s/2, cy=s/2, r=50;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='#333'; ctx.lineWidth=8; ctx.stroke();
  if(progress>0){
    ctx.beginPath();
    ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+progress*Math.PI*2);
    ctx.strokeStyle='#f80'; ctx.lineWidth=8; ctx.stroke();
  }
  // time text
  ctx.fillStyle='#f80'; ctx.font='bold 18px Courier New';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(label,cx,cy);
  return new THREE.CanvasTexture(c);
}

function createPrizeTexture(){
  const c=document.createElement('canvas'); c.width=512; c.height=512;
  const ctx=c.getContext('2d');
  const grad=ctx.createRadialGradient(256,256,40,256,256,250);
  grad.addColorStop(0,'#ff0'); grad.addColorStop(.5,'#f80'); grad.addColorStop(1,'#620');
  ctx.fillStyle=grad; ctx.fillRect(0,0,512,512);
  ctx.fillStyle='#fff'; ctx.font='bold 48px Courier New';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🏆 PRIZE 🏆',256,200);
  ctx.font='32px Courier New';
  ctx.fillText('VAULT',256,270);
  ctx.fillText('UNLOCKED!',256,310);
  ctx.font='24px Courier New';
  ctx.fillStyle='#ffa';
  ctx.fillText('Master of Fractions',256,380);
  return new THREE.CanvasTexture(c);
}

/* ======== MATH ENGINE ======== */
const denominations = [8, 16, 32, 64];
const boltSizes = [
  {n:1,d:2},{n:1,d:4},{n:3,d:4},
  {n:1,d:8},{n:3,d:8},{n:5,d:8},{n:7,d:8}
];

function generateBoltData(count){
  const bolts=[];
  const usedIndices = new Set();
  for(let i=0;i<count;i++){
    let idx;
    do { idx = Math.floor(Math.random()*boltSizes.length); }
    while(usedIndices.has(idx) && usedIndices.size < boltSizes.length);
    usedIndices.add(idx);
    const target = boltSizes[idx];
    const displaySet = denominations.filter(d => d > target.d && d % target.d === 0);
    if(displaySet.length===0) { i--; usedIndices.delete(idx); continue; }
    const sessionDenominator = displaySet[Math.floor(Math.random()*displaySet.length)];
    const correctNumerator = target.n * (sessionDenominator / target.d);

    // Generate options
    const optSet = new Set();
    optSet.add(correctNumerator);
    const offsets = [-2,-1,1,2];
    while(optSet.size < 4){
      const off = offsets[Math.floor(Math.random()*offsets.length)];
      const v = correctNumerator + off;
      if(v > 0 && v < sessionDenominator) optSet.add(v);
    }
    // If still not enough, add more
    let fallback = 1;
    while(optSet.size < 3){
      if(fallback !== correctNumerator && fallback > 0 && fallback < sessionDenominator) optSet.add(fallback);
      fallback++;
    }
    const options = Array.from(optSet).sort((a,b)=>a-b);

    bolts.push({
      targetFraction: {n: target.n, d: target.d},
      displayLabel: `${target.n}/${target.d} in`,
      socketDenominator: sessionDenominator,
      correctNumerator,
      options,
      active: true,
      stripped: false,
      cooldownEnd: 0,
      lockEnd: 0,
    });
  }
  return bolts;
}

/* ======== BOLT MESHES ======== */
const BOLT_COUNT = 8;
let boltData = generateBoltData(BOLT_COUNT);

function createHexBoltGeometry(){
  const shape = new THREE.Shape();
  const sides = 6, radius = 0.22;
  for(let i=0; i<sides; i++){
    const angle = (i/sides)*Math.PI*2 - Math.PI/6;
    const x = Math.cos(angle)*radius, y = Math.sin(angle)*radius;
    if(i===0) shape.moveTo(x,y); else shape.lineTo(x,y);
  }
  shape.closePath();
  const extrudeSettings = {depth: 0.18, bevelEnabled: true, bevelThickness:0.02, bevelSize:0.02, bevelSegments:2};
  return new THREE.ExtrudeGeometry(shape, extrudeSettings);
}

function createBoltShaft(){
  return new THREE.CylinderGeometry(0.08, 0.08, 0.5, 12);
}

const boltMeshes = [];
const boltGroup = new THREE.Group();

const boltPositions = [];
const plateRadius = 2.1;
for(let i=0;i<BOLT_COUNT;i++){
  const angle = (i/BOLT_COUNT)*Math.PI*2;
  boltPositions.push({x: Math.cos(angle)*plateRadius, z: Math.sin(angle)*plateRadius});
}

boltData.forEach((bd, i)=>{
  const group = new THREE.Group();
  // Head
  const headGeo = createHexBoltGeometry();
  const tex = createBoltTexture(bd.displayLabel, false);
  const headMat = new THREE.MeshStandardMaterial({
    map: tex, metalness: 0.9, roughness: 0.25, color: 0xaabbcc
  });
  const head = new THREE.Mesh(headGeo, headMat);
  head.rotation.x = -Math.PI/2;
  head.position.y = 0.08;
  head.castShadow = true;
  group.add(head);

  // Shaft
  const shaftGeo = createBoltShaft();
  const shaftMat = new THREE.MeshStandardMaterial({metalness:0.8, roughness:0.35, color:0x889});
  const shaft = new THREE.Mesh(shaftGeo, shaftMat);
  shaft.position.y = -0.17;
  shaft.castShadow = true;
  group.add(shaft);

  group.position.set(boltPositions[i].x, 0.08, boltPositions[i].z);
  group.userData = {index: i, head, headMat, originalTex: tex};
  boltMeshes.push(group);
  boltGroup.add(group);
});
scene.add(boltGroup);

/* ======== PARTICLE SYSTEM ======== */
const SPARK_COUNT = 60;
const sparkGeo = new THREE.BufferGeometry();
const sparkPositions = new Float32Array(SPARK_COUNT*3);
const sparkVelocities = [];
const sparkLifetimes = new Float32Array(SPARK_COUNT);
sparkGeo.setAttribute('position', new THREE.BufferAttribute(sparkPositions, 3));
const sparkMat = new THREE.PointsMaterial({color:0xff8800, size:0.06, transparent:true, opacity:0.9, blending:THREE.AdditiveBlending, depthWrite:false});
const sparks = new THREE.Points(sparkGeo, sparkMat);
sparks.visible = false;
scene.add(sparks);
let sparkActive = false;
let sparkTimer = 0;

function triggerSparks(pos){
  sparkActive = true;
  sparkTimer = 0;
  sparks.visible = true;
  sparks.position.copy(pos);
  for(let i=0;i<SPARK_COUNT;i++){
    sparkPositions[i*3]=0; sparkPositions[i*3+1]=0; sparkPositions[i*3+2]=0;
    sparkVelocities[i] = new THREE.Vector3(
      (Math.random()-.5)*.15,
      Math.random()*.1+.05,
      (Math.random()-.5)*.15
    );
    sparkLifetimes[i]=Math.random()*.5+.3;
  }
  sparkGeo.attributes.position.needsUpdate=true;
}

function updateSparks(dt){
  if(!sparkActive) return;
  sparkTimer+=dt;
  let alive=false;
  for(let i=0;i<SPARK_COUNT;i++){
    sparkLifetimes[i]-=dt;
    if(sparkLifetimes[i]>0){
      alive=true;
      sparkPositions[i*3]+=sparkVelocities[i].x*dt*4;
      sparkPositions[i*3+1]+=sparkVelocities[i].y*dt*4;
      sparkPositions[i*3+2]+=sparkVelocities[i].z*dt*4;
      sparkVelocities[i].y-=dt*0.3;
    } else {
      sparkPositions[i*3+1]=-999;
    }
  }
  sparkGeo.attributes.position.needsUpdate=true;
  if(!alive){ sparkActive=false; sparks.visible=false; }
}

/* ======== CAMERA TWEEN ======== */
const overviewPos = new THREE.Vector3(0, 8, 6);
const overviewLook = new THREE.Vector3(0, 0, 0);
let tweening = false;
let tweenStart = {}, tweenEnd = {}, tweenDuration = 0, tweenElapsed = 0;
let tweenCallback = null;

function easeInOut(t){ return t<.5 ? 2*t*t : -1+(4-2*t)*t; }

function tweenCamera(targetPos, targetLook, duration, cb){
  tweening = true;
  tweenStart = {
    pos: camera.position.clone(),
    look: new THREE.Vector3()
  };
  // Get current lookAt from camera direction
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  tweenStart.look.copy(camera.position).add(dir.multiplyScalar(5));

  tweenEnd = {pos: targetPos.clone(), look: targetLook.clone()};
  tweenDuration = duration;
  tweenElapsed = 0;
  tweenCallback = cb || null;
}

function updateTween(dt){
  if(!tweening) return;
  tweenElapsed += dt;
  let t = Math.min(tweenElapsed / tweenDuration, 1);
  t = easeInOut(t);

  camera.position.lerpVectors(tweenStart.pos, tweenEnd.pos, t);
  const look = new THREE.Vector3().lerpVectors(tweenStart.look, tweenEnd.look, t);
  camera.lookAt(look);

  if(tweenElapsed >= tweenDuration){
    tweening = false;
    camera.position.copy(tweenEnd.pos);
    camera.lookAt(tweenEnd.look);
    if(tweenCallback) tweenCallback();
  }
}

function updateHUD(){
  progressText.textContent = `Bolts Removed: ${totalRemoved} / ${BOLT_COUNT}`;
  progressBar.style.width = `${(totalRemoved/BOLT_COUNT)*100}%`;
}
updateHUD();

function showMessage(msg, duration){
  messageEl.textContent = msg;
  if(duration) setTimeout(()=>{ if(messageEl.textContent===msg) messageEl.textContent=''; }, duration);
}

function showSocketUI(boltIdx){
  const bd = boltData[boltIdx];
  socketTitle.textContent = `Bolt: ${bd.displayLabel}`;
  socketSubtitle.textContent = `Select socket size (units: 1/${bd.socketDenominator})`;
  socketOptions.innerHTML='';
  bd.options.forEach(opt=>{
    const btn = document.createElement('button');
    btn.className='socket-btn';
    btn.textContent=`${opt}/${bd.socketDenominator} in`;
    btn.addEventListener('click',()=>evaluate(boltIdx, opt));
    socketOptions.appendChild(btn);
  });
  socketUI.style.display='flex';
}

function hideSocketUI(){
  socketUI.style.display='none';
}

function evaluate(boltIdx, chosen){
  const bd = boltData[boltIdx];
  const correct = bd.correctNumerator;
  totalAttempts++;

  if(chosen === correct){
    // SUCCESS
    correctAttempts++;
    currentState = State.EVALUATING;
    hideSocketUI();
    backBtn.style.display='none';
    manualIcon.style.display='none';
    showMessage('✓ CORRECT – Removing bolt...', 2000);
    playSuccess();

    // Unscrew animation
    const group = boltMeshes[boltIdx];
    const startY = group.position.y;
    const startRot = group.rotation.y;
    let unscrewT = 0;
    const unscrewInterval = setInterval(()=>{
      unscrewT += 0.02;
      group.position.y = startY + unscrewT * 2;
      group.rotation.y = startRot + unscrewT * Math.PI * 8;
      if(unscrewT >= 1){
        clearInterval(unscrewInterval);
        group.visible = false;
        bd.active = false;
        totalRemoved++;
        updateHUD();
        if(totalRemoved >= BOLT_COUNT){
          winGame();
        } else {
          returnToOverview();
        }
      }
    }, 16);

  } else if(chosen < correct){
    // TOO SMALL – rattle
    playSmallFail();
    showMessage('⚠ RATCHET SLIP: Socket too small for head.', 4000);
    bd.lockEnd = Date.now() + 5000;
    rattleTarget = boltIdx;
    rattleTimer = 0;
    // Disable buttons temporarily
    const btns = socketOptions.querySelectorAll('.socket-btn');
    btns.forEach(b=>b.disabled=true);
    setTimeout(()=>{
      rattleTarget=-1;
      if(selectedBolt===boltIdx && bd.active){
        btns.forEach(b=>b.disabled=false);
      }
    }, 5000);

  } else {
    // TOO LARGE – stripped!
    playLargeFail();
    showMessage('✖ CRITICAL FAILURE: Bolt head stripped. Recalibrating tool...', 5000);
    bd.stripped = true;
    bd.cooldownEnd = Date.now() + 45000;
    hideSocketUI();

    // Change texture to stripped
    const group = boltMeshes[boltIdx];
    const head = group.userData.head;
    const strippedTex = createBoltTexture(bd.displayLabel, true);
    head.material.map = strippedTex;
    head.material.color.set(0x886655);
    head.material.roughness = 0.6;
    head.material.needsUpdate = true;

    // Spark effect
    triggerSparks(group.position.clone().add(new THREE.Vector3(0,0.2,0)));

    // Show manual icon
    manualIcon.style.display='block';
  }
}

function returnToOverview(){
  currentState = State.ZOOMING;
  hideSocketUI();
  backBtn.style.display='none';
  manualIcon.style.display='none';
  tweenCamera(overviewPos, overviewLook, 0.6, ()=>{
    currentState = State.OVERVIEW;
    selectedBolt = -1;
  });
}

function zoomToBolt(idx){
  if(tweening) return;
  const bd = boltData[idx];
  if(!bd.active) return;

  selectedBolt = idx;
  currentState = State.ZOOMING;

  const group = boltMeshes[idx];
  const boltPos = group.position.clone();
  const targetPos = new THREE.Vector3(boltPos.x, 3.5, boltPos.z + 0.3);
  const targetLook = boltPos.clone();

  tweenCamera(targetPos, targetLook, 0.5, ()=>{
    currentState = State.INPUT;
    // Check cooldown
    const now = Date.now();
    if(bd.cooldownEnd > now){
      // Still in cooldown
      manualIcon.style.display='block';
    } else if(bd.lockEnd > now){
      // Still locked from small fail
      showMessage('⚠ Bolt temporarily locked – wait...', 2000);
    }
    if(!bd.stripped || bd.cooldownEnd <= now){
      showSocketUI(idx);
    }
    backBtn.style.display='block';
  });
}

/* ======== MANUAL (Pedagogical Overlay) ======== */
function showManual(boltIdx){
  const bd = boltData[boltIdx];
  manualOverlay.style.display='block';
  const ctx = manualCanvas.getContext('2d');
  const w = manualCanvas.width, h = manualCanvas.height;
  ctx.clearRect(0,0,w,h);

  const targetN = bd.targetFraction.n;
  const targetD = bd.targetFraction.d;
  const sockD = bd.socketDenominator;
  const correctN = bd.correctNumerator;

  // Draw top bar: bolt fraction
  ctx.fillStyle='#335';
  ctx.fillRect(20,20,w-40,50);
  const segW1 = (w-40)/targetD;
  for(let i=0;i<targetN;i++){
    ctx.fillStyle='#4a4';
    ctx.fillRect(20+i*segW1+1, 22, segW1-2, 46);
  }
  for(let i=0;i<=targetD;i++){
    ctx.strokeStyle='#fff'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(20+i*segW1,20); ctx.lineTo(20+i*segW1,70); ctx.stroke();
  }
  ctx.fillStyle='#fff'; ctx.font='14px Courier New'; ctx.textAlign='center';
  ctx.fillText(`${targetN}/${targetD}`, w/2, 15);

  // Draw bottom bar: socket denominator
  ctx.fillStyle='#335';
  ctx.fillRect(20, 100, w-40, 50);
  const segW2 = (w-40)/sockD;
  for(let i=0;i<correctN;i++){
    ctx.fillStyle='#4a4';
    ctx.fillRect(20+i*segW2+1, 102, segW2-2, 46);
  }
  for(let i=0;i<=sockD;i++){
    ctx.strokeStyle='#888'; ctx.lineWidth=.5;
    ctx.beginPath(); ctx.moveTo(20+i*segW2,100); ctx.lineTo(20+i*segW2,150); ctx.stroke();
  }
  // Mark major dividers
  const mult = sockD/targetD;
  for(let i=0;i<=targetD;i++){
    ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(20+i*mult*segW2,100); ctx.lineTo(20+i*mult*segW2,150); ctx.stroke();
  }
  ctx.fillStyle='#fff';
  ctx.fillText(`${correctN}/${sockD}`, w/2, 95);

  // Equivalence arrow
  ctx.fillStyle='#ff0'; ctx.font='bold 16px Courier New';
  ctx.fillText('=', w/2, 82);

  manualText.textContent = `${targetN}/${targetD} = ${correctN}/${sockD} because ${targetD}×${sockD/targetD} = ${sockD} and ${targetN}×${sockD/targetD} = ${correctN}`;
}

manualIcon.addEventListener('click',()=>{
  if(selectedBolt>=0) showManual(selectedBolt);
});
manualClose.addEventListener('click',()=>{
  manualOverlay.style.display='none';
});

/* ======== INPUT HANDLING ======== */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (e)=>{
  if(currentState!==State.OVERVIEW || tweening) return;
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);

  // Collect all bolt children for raycasting
  const meshes = [];
  boltMeshes.forEach(g => g.traverse(c => { if(c.isMesh) meshes.push(c); }));
  const hits = raycaster.intersectObjects(meshes);

  if(hits.length>0){
    // Find parent group
    let obj = hits[0].object;
    while(obj.parent && !obj.userData.index && obj.userData.index !== 0) obj = obj.parent;
    const idx = obj.userData.index;
    if(idx !== undefined && boltData[idx].active){
      zoomToBolt(idx);
    }
  }
});

backBtn.addEventListener('click', ()=>{
  if(currentState === State.INPUT){
    returnToOverview();
    hideSocketUI();
    manualOverlay.style.display='none';
  }
});

/* ======== WIN CONDITION ======== */
function winGame(){
  currentState = State.WIN;
  hideSocketUI();
  backBtn.style.display='none';
  manualIcon.style.display='none';
  manualOverlay.style.display='none';

  const elapsed = ((Date.now()-startTime)/1000).toFixed(1);
  const accuracy = totalAttempts > 0 ? ((correctAttempts/totalAttempts)*100).toFixed(0) : 100;

  // Animate vault away
  let vaultT = 0;
  const vaultAnim = setInterval(()=>{
    vaultT += 0.02;
    vault.position.y = -vaultT * 3;
    vault.material.opacity = 1 - vaultT;
    vault.material.transparent = true;
    if(vaultT >= 1){
      clearInterval(vaultAnim);
      vault.visible = false;
    }
  }, 16);

  // Return camera
  tweenCamera(new THREE.Vector3(0,6,4), new THREE.Vector3(0,-0.5,0), 1, ()=>{
    setTimeout(()=>{
      winScreen.style.display='flex';
      winTime.textContent=`Total Time: ${elapsed}s`;
      winAccuracy.textContent=`Accuracy: ${accuracy}% (${correctAttempts}/${totalAttempts})`;
    }, 500);
  });
}

restartBtn.addEventListener('click', ()=>{
  // Reset everything
  winScreen.style.display='none';
  vault.visible=true;
  vault.position.y=0;
  vault.material.opacity=1;
  vault.material.transparent=false;
  totalRemoved=0;
  totalAttempts=0;
  correctAttempts=0;
  startTime=Date.now();
  selectedBolt=-1;
  currentState=State.OVERVIEW;
  boltData = generateBoltData(BOLT_COUNT);
  boltMeshes.forEach((g,i)=>{
    g.visible=true;
    g.position.set(boltPositions[i].x, 0.08, boltPositions[i].z);
    g.rotation.y=0;
    const bd=boltData[i];
    const tex=createBoltTexture(bd.displayLabel, false);
    g.userData.head.material.map=tex;
    g.userData.head.material.color.set(0xaabbcc);
    g.userData.head.material.roughness=0.25;
    g.userData.head.material.needsUpdate=true;
    g.userData.originalTex=tex;
  });
  updateHUD();
  showMessage('');
  camera.position.copy(overviewPos);
  camera.lookAt(overviewLook);
});

/* ======== ANIMATION LOOP ======== */
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const now = Date.now();

  // Update tween
  updateTween(dt);

  // Update sparks
  updateSparks(dt);

  // Rattle animation
  if(rattleTarget >= 0){
    rattleTimer += dt;
    const g = boltMeshes[rattleTarget];
    if(g && rattleTimer < 5){
      const intensity = Math.max(0, 1 - rattleTimer/5) * 0.03;
      g.position.x = boltPositions[rattleTarget].x + (Math.random()-.5)*intensity*2;
      g.position.z = boltPositions[rattleTarget].z + (Math.random()-.5)*intensity*2;
    } else if(g){
      g.position.x = boltPositions[rattleTarget].x;
      g.position.z = boltPositions[rattleTarget].z;
    }
  }

  // Update cooldown textures
  boltData.forEach((bd, i)=>{
    if(bd.cooldownEnd > now && bd.active){
      const remaining = (bd.cooldownEnd - now)/1000;
      const progress = 1 - remaining/45;
      const tex = createCooldownTexture(progress, `${Math.ceil(remaining)}s`);
      boltMeshes[i].userData.head.material.map = tex;
      boltMeshes[i].userData.head.material.needsUpdate = true;

      // If zoomed on this bolt and cooldown ends during zoom
      if(selectedBolt === i && bd.cooldownEnd <= now + 100){
        bd.stripped = false;
        const normalTex = createBoltTexture(bd.displayLabel, false);
        boltMeshes[i].userData.head.material.map = normalTex;
        boltMeshes[i].userData.head.material.color.set(0xaabbcc);
        boltMeshes[i].userData.head.material.roughness = 0.25;
        boltMeshes[i].userData.head.material.needsUpdate = true;
      }
    } else if(bd.stripped && bd.cooldownEnd <= now && bd.active){
      // Cooldown ended, restore bolt
      bd.stripped = false;
      const normalTex = createBoltTexture(bd.displayLabel, false);
      boltMeshes[i].userData.head.material.map = normalTex;
      boltMeshes[i].userData.head.material.color.set(0xaabbcc);
      boltMeshes[i].userData.head.material.roughness = 0.25;
      boltMeshes[i].userData.head.material.needsUpdate = true;
      if(selectedBolt === i && currentState === State.INPUT){
        showSocketUI(i);
        manualIcon.style.display='none';
      }
    }
  });

  // Update timer display for selected bolt
  if(selectedBolt >= 0){
    const bd = boltData[selectedBolt];
    if(bd.cooldownEnd > now){
      timerDisplay.textContent = `⏱ Cooldown: ${Math.ceil((bd.cooldownEnd-now)/1000)}s`;
    } else if(bd.lockEnd > now){
      timerDisplay.textContent = `🔒 Locked: ${Math.ceil((bd.lockEnd-now)/1000)}s`;
    } else {
      timerDisplay.textContent = '';
    }
  } else {
    timerDisplay.textContent = '';
  }

  // Show/hide manual icon
  if(selectedBolt >= 0 && boltData[selectedBolt].cooldownEnd > now && boltData[selectedBolt].active){
    manualIcon.style.display='block';
  } else if(currentState !== State.INPUT || selectedBolt < 0){
    manualIcon.style.display='none';
  }

  // Total time
  if(currentState !== State.WIN){
    const elapsed = ((now - startTime)/1000).toFixed(0);
    totalTimeEl.textContent = `Total Time: ${elapsed}s`;
  }

  // Subtle bolt hover glow in overview
  if(currentState === State.OVERVIEW){
    boltMeshes.forEach((g,i)=>{
      if(boltData[i].active && !boltData[i].stripped){
        const pulse = Math.sin(now*0.003 + i)*0.02 + 0.08;
        g.position.y = pulse;
      }
    });
  }

  renderer.render(scene, camera);
}

animate();

/* ======== RESIZE ======== */
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

showMessage('Click a bolt to begin.', 5000);
</script>
